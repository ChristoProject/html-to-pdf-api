name: Build Docker Image

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t html-to-pdf-api .

      - name: Save image as tar
        run: docker save html-to-pdf-api | gzip > html-to-pdf-api.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: html-to-pdf-api
          path: html-to-pdf-api.tar.gz
          retention-days: 7
